# Promtail configuration
# Scrapes container logs from /var/log/pods/ on the node.
# Pipeline stages:
#   1. docker{}   — unwrap the Docker/containerd log envelope (stream, time, log fields)
#   2. json{}     — parse the inner JSON log line (Winston format)
#   3. labels{}   — promote level, service, requestId to Loki stream labels
#   4. timestamp  — use the Winston timestamp, not the containerd wrapper time
#
# Label cardinality note:
#   requestId has HIGH cardinality (UUID per request) — it is extracted as a
#   structured metadata field, NOT as a stream label. Loki stream labels must
#   be low-cardinality (level, service, namespace, pod). High-cardinality
#   values go into the log line or structured_metadata.
#   See: https://grafana.com/docs/loki/latest/get-started/labels/
#
# Namespace filter: only businessbot and monitoring — ignores kube-system noise.
apiVersion: v1
kind: ConfigMap
metadata:
  name: promtail-config
  namespace: monitoring
data:
  promtail.yaml: |
    server:
      http_listen_port: 9080
      grpc_listen_port: 0
      log_level: warn

    positions:
      filename: /run/promtail/positions.yaml

    clients:
      - url: http://loki.monitoring:3100/loki/api/v1/push
        backoff_config:
          min_period: 500ms
          max_period: 5m
          max_retries: 10

    scrape_configs:
      # -----------------------------------------------------------------------
      # Scrape all pod logs directly from the filesystem.
      # K3S stores logs at /var/log/pods/<namespace>_<pod>_<uid>/<container>/*.log
      # Using static_configs + file glob is more reliable than kubernetes_sd_configs
      # on single-node K3S — no service discovery timing issues.
      # -----------------------------------------------------------------------
      - job_name: kubernetes-pods
        static_configs:
          - targets:
              - localhost
            labels:
              job: kubernetes-pods
              __path__: /var/log/pods/*/*/*.log

        pipeline_stages:
          # Unwrap containerd/CRI log envelope:
          # {"log":"...\n","stream":"stdout","time":"..."}
          - cri: {}

          # Extract namespace, pod, container from the file path.
          # Path format: /var/log/pods/<namespace>_<pod>_<uid>/<container>/0.log
          - regex:
              expression: '/var/log/pods/(?P<namespace>[^_]+)_(?P<pod>[^_]+)_[^/]+/(?P<container>[^/]+)/.*'
              source: filename

          # Only keep businessbot and monitoring namespaces
          - match:
              selector: '{namespace=~"businessbot|monitoring"}'
              stages:
                # Parse Winston JSON log line
                - json:
                    expressions:
                      level:      level
                      message:    message
                      service:    service
                      request_id: requestId
                      ts:         timestamp
                # Promote low-cardinality fields to stream labels
                - labels:
                    level:     ""
                    service:   ""
                # Use Winston timestamp
                - timestamp:
                    source: ts
                    format: RFC3339Nano
                    fallback_formats:
                      - "2006-01-02T15:04:05.999Z07:00"

          # Always promote namespace, pod, container as labels
          - labels:
              namespace: ""
              pod:       ""
              container: ""

          # Drop pods from namespaces we don't care about
          - match:
              selector: '{namespace!~"businessbot|monitoring"}'
              action: drop

