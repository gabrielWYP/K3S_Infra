# Patch para agregar Loki como datasource en Grafana.
#
# Grafana carga datasources desde ConfigMaps con label
# grafana_datasource=1 en el namespace monitoring.
# El kube-prometheus-stack ya tiene el ConfigMap
# prometheus-kube-prometheus-grafana-datasource con Prometheus y Alertmanager.
#
# En lugar de modificar ese ConfigMap (que es gestionado por Helm y se
# sobreescribiría en upgrades), creamos uno nuevo independiente.
# Grafana sidecar (grafana-sc-datasources) detecta TODOS los ConfigMaps
# con la label grafana_datasource=1 en el namespace.
apiVersion: v1
kind: ConfigMap
metadata:
  name: loki-grafana-datasource
  namespace: monitoring
  labels:
    grafana_datasource: "1"
data:
  loki-datasource.yaml: |
    apiVersion: 1
    datasources:
      - name: "Loki"
        type: loki
        uid: loki
        url: http://loki.monitoring:3100
        access: proxy
        isDefault: false
        jsonData:
          maxLines: 1000
          # Derived fields — link requestId in logs to a Loki query
          # so you can click a requestId and see all logs for that request.
          derivedFields:
            - name: "requestId"
              matcherRegex: '"requestId":"([^"]+)"'
              url: '/explore?orgId=1&left={"datasource":"loki","queries":[{"expr":"{namespace=\"businessbot\"} |= \"$${__value.raw}\""}]}'
              urlDisplayLabel: "All logs for request"
