apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: sentiment-analysis-monitor
  namespace: monitoring
  labels:
    release: prometheus
spec:
  namespaceSelector:
    matchNames:
      - sandbox
  selector:
    matchLabels:
      app: sentiment-analysis
  endpoints:
    - port: http 
      path: /metrics
      interval: 15s