---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sentiment-analysis-web
  labels:
    app: sentiment-analysis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sentiment-analysis
      component: web
  template:
    metadata:
      labels:
        app: sentiment-analysis
        component: web
    spec:
      serviceAccountName: sentiment-analysis-sa
      containers:
      - name: sentiment-analysis-web
        # image is managed by CI — updated via 'kubectl set image' on each deploy
        image: ghcr.io/gabrielwyp/sentiment_elections_dev/sentiment-web:main-4bdfc13
        imagePullPolicy: IfNotPresent
        ports:
        - name: http
          containerPort: 8000
        envFrom:
        - configMapRef:
            name: sentiment-analysis-config
        - secretRef:
            name: sentiment-analysis-secrets
        
        startupProbe:
          httpGet:
            path: /health
            port: 8000
          failureThreshold: 30
          periodSeconds: 5
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 15
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 30

---