name: Validate Kubernetes Manifests

on:
  workflow_call:
    inputs:
      manifest-path:
        description: 'Path to manifests directory (e.g., Business_Bot, Sentiment_Analysis)'
        required: true
        type: string

jobs:
  validate:
    name: Validate Manifests
    runs-on: self-hosted
    steps:
      - name: Checkout infra manifests
        uses: actions/checkout@v4
        with:
          repository: gabrielwyp/K3S_Infra

      - name: Install kubeconform
        run: |
          KUBECONFORM_VERSION="v0.6.7"
          ARCH=$(uname -m)
          case "$ARCH" in
            x86_64)  ARCH_SUFFIX="amd64" ;;
            aarch64) ARCH_SUFFIX="arm64" ;;
            armv7l)  ARCH_SUFFIX="armv6" ;;
            *)       echo "Unsupported architecture: $ARCH"; exit 1 ;;
          esac
          echo "Detected architecture: $ARCH -> $ARCH_SUFFIX"
          sudo rm -f /usr/local/bin/kubeconform
          wget -q "https://github.com/yannh/kubeconform/releases/download/${KUBECONFORM_VERSION}/kubeconform-linux-${ARCH_SUFFIX}.tar.gz" -O - | tar xz -C /tmp
          sudo mv /tmp/kubeconform /usr/local/bin/
          kubeconform -v

      - name: Validate Kubernetes schemas
        run: |
          echo "Validating manifests in ${{ inputs.manifest-path }}..."
          find ${{ inputs.manifest-path }} -name '*.yaml' -not -name 'kustomization.yaml' | \
            xargs kubeconform \
              -strict \
              -ignore-missing-schemas \
              -schema-location default \
              -schema-location 'https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/{{.Group}}/{{.ResourceKind}}_{{.ResourceAPIVersion}}.json' \
              -summary
          echo "Schema validation completed"

      - name: Install yamllint
        run: |
          if ! command -v yamllint &> /dev/null; then
            pip install --quiet yamllint
          fi

      - name: Lint YAML
        run: |
          echo "Linting YAML files in ${{ inputs.manifest-path }}..."
          find ${{ inputs.manifest-path }} -name '*.yaml' | xargs yamllint -d relaxed
          echo "YAML lint completed"
