name: Deploy Business Bot Microservice

on:
  workflow_call:
    inputs:
      image-tag:
        description: 'Image tag (e.g., main-abc1234)'
        required: true
        type: string
      microservice-name:
        description: 'Microservice name (e.g., whatsapp-gateway, chatbot, backend)'
        required: true
        type: string
      kube-namespace:
        description: 'Kubernetes namespace'
        required: true
        type: string
      kube-deployment:
        description: 'Kubernetes deployment name'
        required: true
        type: string
      image-name:
        description: 'Image name in GHCR (e.g., businessbot--whatsapp-gateway)'
        required: true
        type: string
      container-name:
        description: 'Container name inside the K8s deployment spec'
        required: true
        type: string
      registry:
        description: 'Container registry (e.g., ghcr.io)'
        required: true
        type: string
      port:
        description: 'Port where the application is listening'
        required: true
        type: string
      manifest-path:
        description: 'Path to kustomize overlay (e.g., Business_Bot/03-workloads/overlays/whatsapp-gateway)'
        required: true
        type: string
    secrets:
      KUBECONFIG_B64:
        description: 'Base64 encoded kubeconfig for K3S'
        required: true
      # Global Business Bot Secrets
      GROQ_API_KEY:
        description: 'GROQ API key for AI features'
        required: false
      DATABASE_URL:
        description: 'Database connection URL'
        required: false
      REDIS_URL:
        description: 'Redis connection URL'
        required: false
      BUSINESS_BOT_GLOBAL_SECRET_KEY:
        description: 'Global secret key for Business Bot'
        required: false
      # Microservice-specific secrets (passed dynamically based on microservice-name)
      # These are placeholders - actual secrets are configured per microservice environment

  workflow_dispatch:
    inputs:
      image-tag:
        description: 'Image tag from BusinessBot repository (e.g., main-abc1234)'
        required: true
        type: string
      microservice-name:
        description: 'Microservice to deploy (e.g., whatsapp-gateway, chatbot, backend)'
        required: true
        type: choice
        options:
          - whatsapp-gateway
          - chatbot
          - backend
      kube-namespace:
        description: 'Kubernetes namespace'
        required: true
        default: 'business-bot'
        type: string

jobs:
  validate:
    name: Validate Manifests
    uses: gabrielwyp/K3S_Infra/.github/workflows/validate-manifests.yml@main
    with:
      manifest-path: ${{ inputs.manifest-path }}

  deploy:
    name: Deploy to K3S
    runs-on: self-hosted
    environment: ${{ inputs.microservice-name }}
    needs: validate
    
    steps:
      - name: Checkout infra manifests
        uses: actions/checkout@v4
        with:
          repository: gabrielwyp/K3S_Infra

      - name: Setup kubeconfig
        env:
          KUBECONFIG_B64: ${{ secrets.KUBECONFIG_B64 }}
        run: |
          if [ -z "$KUBECONFIG_B64" ]; then
            echo "Error: KUBECONFIG_B64 secret not configured"
            exit 1
          fi
          
          echo "$KUBECONFIG_B64" | base64 -d > /tmp/kubeconfig
          chmod 600 /tmp/kubeconfig
          export KUBECONFIG=/tmp/kubeconfig
          
          echo "Kubeconfig ready"
          kubectl cluster-info | head -3

      - name: Verify K3S connectivity
        env:
          KUBECONFIG: /tmp/kubeconfig
        run: |
          echo "Checking K3S cluster..."
          kubectl get nodes
          echo "Cluster connectivity verified"

      - name: Create namespace
        env:
          KUBECONFIG: /tmp/kubeconfig
          KUBE_NAMESPACE: ${{ inputs.kube-namespace }}
        run: |
          kubectl create namespace $KUBE_NAMESPACE --dry-run=client -o yaml | kubectl apply -f -
          echo "Namespace '$KUBE_NAMESPACE' ready"

      - name: Create global Business Bot secrets
        env:
          KUBECONFIG: /tmp/kubeconfig
          KUBE_NAMESPACE: ${{ inputs.kube-namespace }}
          MICROSERVICE_NAME: ${{ inputs.microservice-name }}
        run: |
          echo "Creating global Business Bot secrets..."
          
          # Global secrets for all microservices
          kubectl create secret generic business-bot-global-secrets \
            --from-literal=GROQ_API_KEY="${{ secrets.GROQ_API_KEY }}" \
            --from-literal=DATABASE_URL="${{ secrets.DATABASE_URL }}" \
            --from-literal=REDIS_URL="${{ secrets.REDIS_URL }}" \
            --from-literal=SECRET_KEY="${{ secrets.BUSINESS_BOT_GLOBAL_SECRET_KEY }}" \
            -n $KUBE_NAMESPACE \
            --dry-run=client -o yaml | kubectl apply -f -
          
          echo "Global secrets created"

      - name: Create microservice-specific secrets
        env:
          KUBECONFIG: /tmp/kubeconfig
          KUBE_NAMESPACE: ${{ inputs.kube-namespace }}
          MICROSERVICE_NAME: ${{ inputs.microservice-name }}
        run: |
          echo "Creating microservice-specific secrets for $MICROSERVICE_NAME..."
          
          # Convert microservice name to secret name format (replace - with _)
          SECRET_NAME="${MICROSERVICE_NAME//-/_}_SECRETS_B64"
          
          # Create microservice-specific secret (empty if no secrets defined)
          # Secrets are expected to be passed from the calling workflow environment
          kubectl create secret generic ${MICROSERVICE_NAME}-secrets \
            --from-literal=PLACEHOLDER="true" \
            -n $KUBE_NAMESPACE \
            --dry-run=client -o yaml | kubectl apply -f -
          
          echo "Microservice-specific secrets created"

      - name: Apply manifests with kustomize
        env:
          KUBECONFIG: /tmp/kubeconfig
          KUBE_NAMESPACE: ${{ inputs.kube-namespace }}
          MANIFEST_PATH: ${{ inputs.manifest-path }}
        run: |
          echo "Applying Business Bot manifests from $MANIFEST_PATH..."
          kubectl apply -k $MANIFEST_PATH -n $KUBE_NAMESPACE
          echo "Manifests applied successfully"

      - name: Determine image tag
        id: image-tag
        run: |
          TAG="${{ inputs.image-tag }}"
          
          if [ -z "$TAG" ]; then
            TAG="${{ github.event.inputs.image-tag }}"
          fi
          
          if [ -z "$TAG" ]; then
            echo "Error: No image tag provided"
            exit 1
          fi
          
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "Image tag: $TAG"

      - name: Update deployment image
        env:
          KUBECONFIG: /tmp/kubeconfig
          IMAGE_TAG: ${{ steps.image-tag.outputs.tag }}
          REGISTRY: ${{ inputs.registry }}
          IMAGE_NAME: ${{ inputs.image-name }}
          CONTAINER_NAME: ${{ inputs.container-name }}
          KUBE_NAMESPACE: ${{ inputs.kube-namespace }}
          KUBE_DEPLOYMENT: ${{ inputs.kube-deployment }}
        run: |
          REPO_OWNER="${{ github.repository_owner }}"
          REPO_OWNER=$(echo "$REPO_OWNER" | tr '[:upper:]' '[:lower:]')
          IMAGE="${REGISTRY}/${REPO_OWNER}/${IMAGE_NAME}:${IMAGE_TAG}"
          
          echo "Updating deployment image..."
          echo "   Deployment : $KUBE_DEPLOYMENT"
          echo "   Container  : $CONTAINER_NAME"
          echo "   Image      : $IMAGE"
          
          kubectl set image deployment/$KUBE_DEPLOYMENT \
            ${CONTAINER_NAME}=${IMAGE} \
            -n $KUBE_NAMESPACE
          
          echo "Image updated"

      - name: Wait for rollout
        env:
          KUBECONFIG: /tmp/kubeconfig
          KUBE_NAMESPACE: ${{ inputs.kube-namespace }}
          KUBE_DEPLOYMENT: ${{ inputs.kube-deployment }}
        run: |
          echo "Waiting for rollout (timeout 5m)..."
          
          kubectl rollout status deployment/$KUBE_DEPLOYMENT \
            -n $KUBE_NAMESPACE \
            --timeout=5m || {
              echo "Rollout failed, initiating rollback..."
              kubectl rollout undo deployment/$KUBE_DEPLOYMENT -n $KUBE_NAMESPACE
              exit 1
            }
          
          echo "Rollout completed successfully"

      - name: Wait for pod readiness
        env:
          KUBECONFIG: /tmp/kubeconfig
          KUBE_NAMESPACE: ${{ inputs.kube-namespace }}
          KUBE_DEPLOYMENT: ${{ inputs.kube-deployment }}
        run: |
          echo "Waiting for pods to be ready..."
          
          kubectl wait --for=condition=ready pod \
            -l app=$KUBE_DEPLOYMENT \
            -n $KUBE_NAMESPACE \
            --timeout=30s || {
              echo "Warning: Pods not ready yet, continuing with health check..."
            }
          
          sleep 2
          echo "Pods status checked"

      - name: Health check
        env:
          KUBECONFIG: /tmp/kubeconfig
          KUBE_NAMESPACE: ${{ inputs.kube-namespace }}
          KUBE_DEPLOYMENT: ${{ inputs.kube-deployment }}
        run: |
          echo "Running health checks..."
          
          POD=$(kubectl get pod -l app=$KUBE_DEPLOYMENT -n $KUBE_NAMESPACE -o jsonpath='{.items[0].metadata.name}' 2>/dev/null || true)
          
          if [ -z "$POD" ]; then
            echo "Warning: No pods found, skipping health check"
            exit 0
          fi
          
          echo "   Testing pod: $POD"
          
          PORT="${{ inputs.port }}"
          
          kubectl port-forward $POD ${PORT}:${PORT} -n $KUBE_NAMESPACE > /dev/null 2>&1 &
          PF_PID=$!
          sleep 2
          
          HEALTH=$(curl -s -m 5 http://localhost:${PORT}/health 2>/dev/null | jq -r '.status // "unknown"' 2>/dev/null)
          
          kill $PF_PID 2>/dev/null || true
          wait $PF_PID 2>/dev/null || true
          
          if [ "$HEALTH" = "healthy" ] || [ "$HEALTH" = "ok" ]; then
            echo "Health check passed: $HEALTH"
          else
            echo "Health check returned: $HEALTH"
          fi

      - name: Verify deployment
        env:
          KUBECONFIG: /tmp/kubeconfig
          KUBE_NAMESPACE: ${{ inputs.kube-namespace }}
          KUBE_DEPLOYMENT: ${{ inputs.kube-deployment }}
        run: |
          echo "=== Deployment Status ==="
          kubectl get deployment -n $KUBE_NAMESPACE
          
          echo ""
          echo "=== Pod Status ==="
          kubectl get pods -n $KUBE_NAMESPACE -l app=$KUBE_DEPLOYMENT
          
          echo ""
          echo "=== Recent Events ==="
          kubectl get events -n $KUBE_NAMESPACE --sort-by='.lastTimestamp' | tail -10

      - name: Success notification
        if: success()
        env:
          KUBE_NAMESPACE: ${{ inputs.kube-namespace }}
          KUBE_DEPLOYMENT: ${{ inputs.kube-deployment }}
        run: |
          echo "Deployment successful!"
          echo ""
          echo "Summary:"
          echo "  Microservice: ${{ inputs.microservice-name }}"
          echo "  Deployment: $KUBE_DEPLOYMENT"
          echo "  Namespace: $KUBE_NAMESPACE"
          echo "  Image tag: ${{ steps.image-tag.outputs.tag }}"
          echo "  Triggered by: ${{ github.event_name }}"
