name: BB - Deploy Queue Consumer

on:
  workflow_call:
    inputs:
      image-tag:
        description: 'Image tag to deploy'
        required: true
        type: string
      kube-namespace:
        description: 'Kubernetes namespace'
        default: 'businessbot'
        required: false
        type: string
    secrets:
      KUBECONFIG_B64:
        description: 'Base64 encoded kubeconfig for K3S'
        required: true
      GHCR_PULL_TOKEN:
        description: 'GitHub PAT with read:packages for pulling images from GHCR'
        required: true
      GROQ_API_KEY:
        description: 'Groq API key for Whisper (passed through to audio-processor)'
        required: true
      OCI_QUEUE_ID:
        description: 'OCI Queue OCID'
        required: true
      OCI_DLQ_ID:
        description: 'OCI Dead Letter Queue OCID'
        required: true
      OCI_QUEUE_ENDPOINT:
        description: 'OCI Queue cell-specific messages endpoint'
        required: true
      OCI_TENANCY_ID:
        description: 'OCI Tenancy OCID'
        required: true
      OCI_USER_ID:
        description: 'OCI User OCID'
        required: true
      OCI_FINGERPRINT:
        description: 'OCI API key fingerprint'
        required: true
      OCI_PRIVATE_KEY_STRING:
        description: 'OCI private key PEM content'
        required: true
      ORACLE_USER:
        description: 'Oracle Autonomous Database username'
        required: true
      ORACLE_PASSWORD:
        description: 'Oracle Autonomous Database password'
        required: true
      ORACLE_CONNECTION_STRING:
        description: 'Oracle connection string (Thin mode, TCPS format)'
        required: true

env:
  MICROSERVICE_NAME: queue-consumer
  MANIFEST_PATH: Business_Bot/03-workloads/overlays/queue-consumer
  IMAGE_NAME: businessbot-queue-consumer
  CONTAINER_NAME: app
  KUBE_DEPLOYMENT: queue-consumer-microservice-base
  PORT: '3005'

jobs:
  validate:
    name: Validate Manifests
    uses: gabrielwyp/K3S_Infra/.github/workflows/validate-manifests.yml@main
    with:
      manifest-path: Business_Bot

  pre-deploy-checks:
    name: Pre-deploy Checks
    runs-on: self-hosted
    needs: validate
    steps:
      - name: Checkout K3S_Infra
        uses: actions/checkout@v4
        with:
          repository: gabrielwyp/K3S_Infra

      - name: Setup kubeconfig
        env:
          KUBECONFIG_B64: ${{ secrets.KUBECONFIG_B64 }}
        run: |
          echo "$KUBECONFIG_B64" | base64 -d > /tmp/kubeconfig
          chmod 600 /tmp/kubeconfig
          export KUBECONFIG=/tmp/kubeconfig

          echo "Pre-deploy checks for Queue Consumer..."

          kubectl get namespace ${{ inputs.kube-namespace }} || {
            echo "Namespace does not exist, will be created during deploy"
          }

          kubectl get deployment ${{ env.KUBE_DEPLOYMENT }} -n ${{ inputs.kube-namespace }} 2>/dev/null || {
            echo "No existing deployment found, fresh deploy"
          }

  deploy-core:
    name: Deploy Core
    runs-on: self-hosted
    needs: [validate, pre-deploy-checks]
    steps:
      - name: Checkout K3S_Infra
        uses: actions/checkout@v4
        with:
          repository: gabrielwyp/K3S_Infra

      - name: Prepare Queue Consumer secrets JSON
        id: secrets-json
        run: |
          echo "Preparing Queue Consumer secrets JSON..."

          GROQ_API_KEY="${{ secrets.GROQ_API_KEY }}"
          OCI_QUEUE_ID="${{ secrets.OCI_QUEUE_ID }}"
          OCI_DLQ_ID="${{ secrets.OCI_DLQ_ID }}"
          OCI_QUEUE_ENDPOINT="${{ secrets.OCI_QUEUE_ENDPOINT }}"
          OCI_TENANCY_ID="${{ secrets.OCI_TENANCY_ID }}"
          OCI_USER_ID="${{ secrets.OCI_USER_ID }}"
          OCI_FINGERPRINT="${{ secrets.OCI_FINGERPRINT }}"
          OCI_PRIVATE_KEY_STRING="${{ secrets.OCI_PRIVATE_KEY_STRING }}"
          ORACLE_USER="${{ secrets.ORACLE_USER }}"
          ORACLE_PASSWORD="${{ secrets.ORACLE_PASSWORD }}"
          ORACLE_CONNECTION_STRING="${{ secrets.ORACLE_CONNECTION_STRING }}"

          if [ -z "$GROQ_API_KEY" ]; then
            echo "::error::Missing required secret: GROQ_API_KEY"
            exit 1
          fi

          if [ -z "$OCI_QUEUE_ID" ] || [ -z "$OCI_DLQ_ID" ] || [ -z "$OCI_QUEUE_ENDPOINT" ] || \
             [ -z "$OCI_TENANCY_ID" ] || [ -z "$OCI_USER_ID" ] || [ -z "$OCI_FINGERPRINT" ] || \
             [ -z "$OCI_PRIVATE_KEY_STRING" ]; then
            echo "::error::Missing required OCI secrets."
            exit 1
          fi

          if [ -z "$ORACLE_USER" ] || [ -z "$ORACLE_PASSWORD" ] || [ -z "$ORACLE_CONNECTION_STRING" ]; then
            echo "::error::Missing required Oracle secrets."
            exit 1
          fi

          SECRETS_JSON=$(jq -cn \
            --arg groq_api_key "$GROQ_API_KEY" \
            --arg oci_queue_id "$OCI_QUEUE_ID" \
            --arg oci_dlq_id "$OCI_DLQ_ID" \
            --arg oci_queue_endpoint "$OCI_QUEUE_ENDPOINT" \
            --arg oci_tenancy_id "$OCI_TENANCY_ID" \
            --arg oci_user_id "$OCI_USER_ID" \
            --arg oci_fingerprint "$OCI_FINGERPRINT" \
            --arg oci_private_key "$OCI_PRIVATE_KEY_STRING" \
            --arg oracle_user "$ORACLE_USER" \
            --arg oracle_password "$ORACLE_PASSWORD" \
            --arg oracle_connection_string "$ORACLE_CONNECTION_STRING" \
            '{
              GROQ_API_KEY: $groq_api_key,
              OCI_QUEUE_ID: $oci_queue_id,
              OCI_DLQ_ID: $oci_dlq_id,
              OCI_QUEUE_ENDPOINT: $oci_queue_endpoint,
              OCI_TENANCY_ID: $oci_tenancy_id,
              OCI_USER_ID: $oci_user_id,
              OCI_FINGERPRINT: $oci_fingerprint,
              OCI_PRIVATE_KEY_STRING: $oci_private_key,
              ORACLE_USER: $oracle_user,
              ORACLE_PASSWORD: $oracle_password,
              ORACLE_CONNECTION_STRING: $oracle_connection_string
            }')

          {
            echo "json<<SECRETS_EOF"
            echo "$SECRETS_JSON"
            echo "SECRETS_EOF"
          } >> "$GITHUB_OUTPUT"
          echo "Secrets JSON prepared (values hidden for security)"

      - name: Deploy to K3S
        uses: ./.github/actions/bb-deploy-core/
        with:
          microservice-name: ${{ env.MICROSERVICE_NAME }}
          image-tag: ${{ inputs.image-tag }}
          kube-namespace: ${{ inputs.kube-namespace }}
          manifest-path: ${{ env.MANIFEST_PATH }}
          image-name: ${{ env.IMAGE_NAME }}
          container-name: ${{ env.CONTAINER_NAME }}
          kube-deployment: ${{ env.KUBE_DEPLOYMENT }}
          port: ${{ env.PORT }}
          health-check-path: /health
        env:
          KUBECONFIG_B64: ${{ secrets.KUBECONFIG_B64 }}
          GHCR_PULL_TOKEN: ${{ secrets.GHCR_PULL_TOKEN }}
          MICROSERVICE_SECRETS_JSON: ${{ steps.secrets-json.outputs.json }}

  post-deploy-verification:
    name: Post-deploy Verification
    runs-on: self-hosted
    needs: deploy-core
    steps:
      - name: Checkout K3S_Infra
        uses: actions/checkout@v4
        with:
          repository: gabrielwyp/K3S_Infra

      - name: Setup kubeconfig
        env:
          KUBECONFIG_B64: ${{ secrets.KUBECONFIG_B64 }}
        run: |
          echo "$KUBECONFIG_B64" | base64 -d > /tmp/kubeconfig
          chmod 600 /tmp/kubeconfig
          export KUBECONFIG=/tmp/kubeconfig

      - name: Verify replicas and readiness
        env:
          KUBECONFIG: /tmp/kubeconfig
        run: |
          echo "Verifying Queue Consumer replicas..."
          kubectl get deployment ${{ env.KUBE_DEPLOYMENT }} -n ${{ inputs.kube-namespace }}
          kubectl get pods -n ${{ inputs.kube-namespace }} -l app=${{ env.KUBE_DEPLOYMENT }}

          READY=$(kubectl get deployment ${{ env.KUBE_DEPLOYMENT }} \
            -n ${{ inputs.kube-namespace }} \
            -o jsonpath='{.status.readyReplicas}' 2>/dev/null || echo "0")

          if [ "$READY" -ge 1 ]; then
            echo "Queue Consumer is running with $READY ready replica(s)"
          else
            echo "::warning::No ready replicas found — check pod logs"
          fi

  notify-success:
    name: Notify Success
    runs-on: self-hosted
    needs: post-deploy-verification
    if: success()
    steps:
      - name: Deployment summary
        run: |
          echo ""
          echo "=========================================="
          echo "  Queue Consumer Deployment Complete"
          echo "=========================================="
          echo "  Microservice: ${{ env.MICROSERVICE_NAME }}"
          echo "  Image Tag:    ${{ inputs.image-tag }}"
          echo "  Namespace:    ${{ inputs.kube-namespace }}"
          echo "  Replicas:     2"
          echo "  Port:         ${{ env.PORT }}"
          echo ""
          echo "  Health:  /health (liveness)"
          echo "  Ready:   /ready (readiness — pool + OCI connected)"
          echo "  Logs: kubectl logs -n ${{ inputs.kube-namespace }} -l app=${{ env.KUBE_DEPLOYMENT }} --all-containers"
          echo "=========================================="
