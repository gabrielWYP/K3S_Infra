name: Deploy Sentiment Analysis to K3S

on:
  workflow_call:
    inputs:
      image-tag:
        description: 'Image tag (e.g., main-abc1234)'
        required: true
        type: string
      kube-namespace:
        description: 'Kubernetes namespace'
        required: true
        type: string
      kube-deployment:
        description: 'Kubernetes deployment for each model or web'
        type: string
        required: true
      image-name:
        description: 'Image name within the repo (e.g., sentiment-service, web-service)'
        required: true
        type: string
      container-name:
        description: 'Container name inside the K8s deployment spec'
        required: true
        type: string
      deployment-manifest:
        description: 'Path to the deployment manifest (e.g., 03-workloads/backend-deployment.yaml)'
        required: true
        type: string
      registry:
        description: 'Container registry (e.g., ghcr.io)'
        required: true
        type: string
      port:
        description : 'Port where the application is listening'
        required: true
        type: string
    secrets:
      KUBECONFIG_B64:
        description: 'Base64 encoded kubeconfig for K3S'
        required: true
      ORACLE_USER:
        description: 'Oracle DB username'
        required: true
      ORACLE_PASSWORD:
        description: 'Oracle DB password'
        required: true
      ORACLE_CONNECTION_STRING:
        description: 'Connection String for database'
        required: true
      SECRET_KEY:
        description: 'Secret key for application'
        required: true
  
  workflow_dispatch:
    inputs:
      image-tag:
        description: 'Image tag from sentiment_elections_dev (e.g., main-abc1234)'
        required: true
        type: string

jobs:
  validate:
    name: Validate Manifests
    uses: gabrielwyp/K3S_Infra/.github/workflows/validate-manifests.yml@main
    with:
      manifest-path: Sentiment_Analysis

  deploy:
    name: Deploy to K3S
    runs-on: self-hosted
    environment: sentiment-analysis
    needs: validate
    
    steps:
      - name: Checkout infra manifests
        uses: actions/checkout@v4
        with:
          repository: gabrielwyp/K3S_Infra

      - name: Setup kubeconfig
        env:
          KUBECONFIG_B64: ${{ secrets.KUBECONFIG_B64 }}
        run: |
          if [ -z "$KUBECONFIG_B64" ]; then
            echo "❌ Error: KUBECONFIG_B64 secret not configured"
            exit 1
          fi
          
          echo "$KUBECONFIG_B64" | base64 -d > /tmp/kubeconfig
          chmod 600 /tmp/kubeconfig
          export KUBECONFIG=/tmp/kubeconfig
          
          echo "✓ Kubeconfig ready"
          kubectl cluster-info | head -3

      - name: Verify K3S connectivity
        env:
          KUBECONFIG: /tmp/kubeconfig
        run: |
          echo "Checking K3S cluster..."
          kubectl get nodes
          echo "✓ Cluster connectivity verified"

      - name: Create namespace
        env:
          KUBECONFIG: /tmp/kubeconfig
          KUBE_NAMESPACE: ${{ inputs.kube-namespace }}
        run: |
          kubectl create namespace $KUBE_NAMESPACE --dry-run=client -o yaml | kubectl apply -f -
          echo "✓ Namespace '$KUBE_NAMESPACE' ready"

      - name: Create app secrets
        env:
          KUBECONFIG: /tmp/kubeconfig
          ORACLE_USER: ${{ secrets.ORACLE_USER }}
          ORACLE_PASSWORD: ${{ secrets.ORACLE_PASSWORD }}
          ORACLE_CONNECTION_STRING: ${{ secrets.ORACLE_CONNECTION_STRING }}
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
          KUBE_NAMESPACE: ${{ inputs.kube-namespace }}
        run: |
          echo "Creating secrets..."
          
          kubectl create secret generic sentiment-analysis-secrets \
            --from-literal=ORACLE_USER="$ORACLE_USER" \
            --from-literal=ORACLE_PASSWORD="$ORACLE_PASSWORD" \
            --from-literal=ORACLE_CONNECTION_STRING="$ORACLE_CONNECTION_STRING" \
            --from-literal=SECRET_KEY="$SECRET_KEY" \
            -n $KUBE_NAMESPACE \
            --dry-run=client -o yaml | kubectl apply -f -
          
          echo "✓ Secrets created"

      - name: Apply manifests
        env:
          KUBECONFIG: /tmp/kubeconfig
          KUBE_NAMESPACE: ${{ inputs.kube-namespace }}
          DEPLOYMENT_MANIFEST: ${{ inputs.deployment-manifest }}
        run: |
          echo "Deploying Sentiment Analysis..."
          kubectl apply -k Sentiment_Analysis/ -n $KUBE_NAMESPACE
          kubectl apply -f Sentiment_Analysis/$DEPLOYMENT_MANIFEST -n $KUBE_NAMESPACE
          echo "✓ Manifests applied"

      - name: Determine image tag
        id: image-tag
        run: |
          # Para reusable workflow (workflow_call)
          TAG="${{ inputs.image-tag }}"
          
          # Fallback para workflow_dispatch
          if [ -z "$TAG" ]; then
            TAG="${{ github.event.inputs.image-tag }}"
          fi
          
          if [ -z "$TAG" ]; then
            echo "❌ No image tag provided"
            exit 1
          fi
          
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "📦 Image tag: $TAG"

      - name: Update deployment image
        env:
          KUBECONFIG: /tmp/kubeconfig
          IMAGE_TAG: ${{ steps.image-tag.outputs.tag }}
          REGISTRY: ${{ inputs.registry }}
          IMAGE_NAME: ${{ inputs.image-name }}
          CONTAINER_NAME: ${{ inputs.container-name }}
          KUBE_NAMESPACE: ${{ inputs.kube-namespace }}
          KUBE_DEPLOYMENT: ${{ inputs.kube-deployment }}
        run: |
          REPO_OWNER="${{ github.repository_owner }}"
          REPO_OWNER=$(echo "$REPO_OWNER" | tr '[:upper:]' '[:lower:]')
          SOURCE_REPO=$(echo "${{ github.event.repository.name }}" | tr '[:upper:]' '[:lower:]')
          IMAGE="${REGISTRY}/${REPO_OWNER}/${SOURCE_REPO}/${IMAGE_NAME}:${IMAGE_TAG}"
          
          echo "Updating deployment image..."
          echo "   Deployment : $KUBE_DEPLOYMENT"
          echo "   Container  : $CONTAINER_NAME"
          echo "   Image      : $IMAGE"
          
          kubectl set image deployment/$KUBE_DEPLOYMENT \
            ${CONTAINER_NAME}=${IMAGE} \
            -n $KUBE_NAMESPACE
          
          echo "✓ Image updated"

      - name: Wait for rollout
        env:
          KUBECONFIG: /tmp/kubeconfig
          KUBE_NAMESPACE: ${{ inputs.kube-namespace }}
          KUBE_DEPLOYMENT: ${{ inputs.kube-deployment }}
        run: |
          echo "Waiting for rollout (timeout 5m)..."
          
          kubectl rollout status deployment/$KUBE_DEPLOYMENT \
            -n $KUBE_NAMESPACE \
            --timeout=5m || {
              echo "❌ Rollout failed, initiating rollback..."
              kubectl rollout undo deployment/$KUBE_DEPLOYMENT -n $KUBE_NAMESPACE
              exit 1
            }
          
          echo "✓ Rollout completed successfully"

      - name: Wait for pod readiness
        env:
          KUBECONFIG: /tmp/kubeconfig
          KUBE_NAMESPACE: ${{ inputs.kube-namespace }}
          KUBE_DEPLOYMENT: ${{ inputs.kube-deployment }}
        run: |
          echo "Waiting for pods to be ready..."
          
          kubectl wait --for=condition=ready pod \
            -l app=$KUBE_DEPLOYMENT \
            -n $KUBE_NAMESPACE \
            --timeout=30s || {
              echo "⚠️  Warning: Pods not ready yet, continuing with health check..."
            }
          
          sleep 2
          echo "✓ Pods status checked"

      - name: Health check
        env:
          KUBECONFIG: /tmp/kubeconfig
          KUBE_NAMESPACE: ${{ inputs.kube-namespace }}
          KUBE_DEPLOYMENT: ${{ inputs.kube-deployment }}
          PORT: ${{ inputs.port }}
        run: |
          echo "Running health checks..."
          
          # Get the first pod
          POD=$(kubectl get pod -l app=$KUBE_DEPLOYMENT -n $KUBE_NAMESPACE -o jsonpath='{.items[0].metadata.name}' 2>/dev/null || true)
          
          if [ -z "$POD" ]; then
            echo "⚠️  Warning: No pods found, skipping health check"
            exit 0
          fi
          
          echo "   Testing pod: $POD"
          
          # Port forward in background
          kubectl port-forward $POD $PORT:$PORT -n $KUBE_NAMESPACE > /dev/null 2>&1 &
          PF_PID=$!
          sleep 2
          
          # Health check
          HEALTH=$(curl -s -m 5 http://localhost:$PORT/health 2>/dev/null | jq -r '.status // "unknown"' 2>/dev/null)
          
          kill $PF_PID 2>/dev/null || true
          wait $PF_PID 2>/dev/null || true
          
          if [ "$HEALTH" = "healthy" ] || [ "$HEALTH" = "ok" ]; then
            echo "✓ Health check passed: $HEALTH"
          else
            echo "⚠️  Health check returned: $HEALTH"
          fi

      - name: Verify deployment
        env:
          KUBECONFIG: /tmp/kubeconfig
          KUBE_NAMESPACE: ${{ inputs.kube-namespace }}
          KUBE_DEPLOYMENT: ${{ inputs.kube-deployment }}
        run: |
          echo "=== Deployment Status ==="
          kubectl get deployment -n $KUBE_NAMESPACE
          
          echo ""
          echo "=== Pod Status ==="
          kubectl get pods -n $KUBE_NAMESPACE -l app=$KUBE_DEPLOYMENT
          
          echo ""
          echo "=== Recent Events ==="
          kubectl get events -n $KUBE_NAMESPACE --sort-by='.lastTimestamp' | tail -10

      - name: Success notification
        if: success()
        env:
          KUBE_NAMESPACE: ${{ inputs.kube-namespace }}
          KUBE_DEPLOYMENT: ${{ inputs.kube-deployment }}
        run: |
          echo "✅ Deployment successful!"
          echo ""
          echo "Summary:"
          echo "  Deployment: $KUBE_DEPLOYMENT"
          echo "  Namespace: $KUBE_NAMESPACE"
          echo "  Image tag: ${{ steps.image-tag.outputs.tag }}"
          echo "  Triggered by: ${{ github.event_name }}"
