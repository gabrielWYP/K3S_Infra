name: BB - Deploy Tool Executor

on:
  workflow_call:
    inputs:
      image-tag:
        description: 'Image tag to deploy'
        required: true
        type: string
      kube-namespace:
        description: 'Kubernetes namespace'
        default: 'businessbot'
        required: false
        type: string
    secrets:
      KUBECONFIG_B64:
        required: true
      GHCR_PULL_TOKEN:
        required: true
      ORACLE_USER:
        required: true
      ORACLE_PASSWORD:
        required: true
      ORACLE_CONNECTION_STRING:
        required: true

env:
  MICROSERVICE_NAME: tool-executor
  MANIFEST_PATH: Business_Bot/03-workloads/overlays/tool-executor
  IMAGE_NAME: businessbot-tool-executor
  CONTAINER_NAME: app
  KUBE_DEPLOYMENT: tool-executor-microservice-base
  PORT: '3003'

jobs:
  validate:
    name: Validate Manifests
    uses: gabrielwyp/K3S_Infra/.github/workflows/validate-manifests.yml@main
    with:
      manifest-path: Business_Bot

  pre-deploy-checks:
    name: Pre-deploy Checks
    runs-on: self-hosted
    needs: validate
    steps:
      - name: Checkout K3S_Infra
        uses: actions/checkout@v4
        with:
          repository: gabrielwyp/K3S_Infra

      - name: Setup kubeconfig
        env:
          KUBECONFIG_B64: ${{ secrets.KUBECONFIG_B64 }}
        run: |
          echo "$KUBECONFIG_B64" | base64 -d > /tmp/kubeconfig
          chmod 600 /tmp/kubeconfig
          export KUBECONFIG=/tmp/kubeconfig
          kubectl get namespace ${{ inputs.kube-namespace }} || echo "Namespace will be created"
          kubectl get deployment ${{ env.KUBE_DEPLOYMENT }} -n ${{ inputs.kube-namespace }} 2>/dev/null || echo "Fresh deploy"

  deploy-core:
    name: Deploy Core
    runs-on: self-hosted
    needs: [validate, pre-deploy-checks]
    steps:
      - name: Checkout K3S_Infra
        uses: actions/checkout@v4
        with:
          repository: gabrielwyp/K3S_Infra

      - name: Prepare Tool Executor secrets JSON
        id: secrets-json
        run: |
          ORACLE_USER="${{ secrets.ORACLE_USER }}"
          ORACLE_PASSWORD="${{ secrets.ORACLE_PASSWORD }}"
          ORACLE_CONNECTION_STRING="${{ secrets.ORACLE_CONNECTION_STRING }}"

          if [ -z "$ORACLE_USER" ] || [ -z "$ORACLE_PASSWORD" ] || [ -z "$ORACLE_CONNECTION_STRING" ]; then
            echo "::error::Missing required Oracle secrets"
            exit 1
          fi

          SECRETS_JSON=$(jq -cn \
            --arg oracle_user "$ORACLE_USER" \
            --arg oracle_password "$ORACLE_PASSWORD" \
            --arg oracle_connection_string "$ORACLE_CONNECTION_STRING" \
            '{
              ORACLE_USER: $oracle_user,
              ORACLE_PASSWORD: $oracle_password,
              ORACLE_CONNECTION_STRING: $oracle_connection_string
            }')

          {
            echo "json<<SECRETS_EOF"
            echo "$SECRETS_JSON"
            echo "SECRETS_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Deploy to K3S
        uses: ./.github/actions/bb-deploy-core/
        with:
          microservice-name: ${{ env.MICROSERVICE_NAME }}
          image-tag: ${{ inputs.image-tag }}
          kube-namespace: ${{ inputs.kube-namespace }}
          manifest-path: ${{ env.MANIFEST_PATH }}
          image-name: ${{ env.IMAGE_NAME }}
          container-name: ${{ env.CONTAINER_NAME }}
          kube-deployment: ${{ env.KUBE_DEPLOYMENT }}
          port: ${{ env.PORT }}
        env:
          KUBECONFIG_B64: ${{ secrets.KUBECONFIG_B64 }}
          GHCR_PULL_TOKEN: ${{ secrets.GHCR_PULL_TOKEN }}
          MICROSERVICE_SECRETS_JSON: ${{ steps.secrets-json.outputs.json }}

  post-deploy-verification:
    name: Post-deploy Verification
    runs-on: self-hosted
    needs: deploy-core
    steps:
      - name: Checkout K3S_Infra
        uses: actions/checkout@v4
        with:
          repository: gabrielwyp/K3S_Infra

      - name: Verify service
        env:
          KUBECONFIG_B64: ${{ secrets.KUBECONFIG_B64 }}
        run: |
          echo "$KUBECONFIG_B64" | base64 -d > /tmp/kubeconfig
          chmod 600 /tmp/kubeconfig
          export KUBECONFIG=/tmp/kubeconfig
          kubectl get svc -n ${{ inputs.kube-namespace }} | grep ${{ env.MICROSERVICE_NAME }}
          kubectl get pods -n ${{ inputs.kube-namespace }} -l app=${{ env.KUBE_DEPLOYMENT }}

  notify-success:
    name: Notify Success
    runs-on: self-hosted
    needs: post-deploy-verification
    if: success()
    steps:
      - name: Deployment summary
        run: |
          echo "=========================================="
          echo "  Tool Executor Deployment Complete"
          echo "  Internal URL: http://tool-executor-microservice-base-service:80"
          echo "  Health: kubectl port-forward -n ${{ inputs.kube-namespace }} deploy/${{ env.KUBE_DEPLOYMENT }} 3003:3003"
          echo "=========================================="
