name: BB - Deploy WhatsApp Gateway

on:
  workflow_call:
    inputs:
      image-tag:
        description: 'Image tag to deploy'
        required: true
        type: string
      kube-namespace:
        description: 'Kubernetes namespace'
        default: 'businessbot'
        required: false
        type: string
    secrets:
      KUBECONFIG_B64:
        description: 'Base64 encoded kubeconfig for K3S'
        required: true
      WHATSAPP_ACCESS_TOKEN:
        description: 'WhatsApp API access token'
        required: true
      WHATSAPP_API_URL:
        description: 'WhatsApp API URL'
        required: true
      WHATSAPP_PHONE_NUMBER_ID:
        description: 'WhatsApp phone number ID'
        required: true
      WHATSAPP_WEBHOOK_SECRET:
        description: 'WhatsApp webhook secret'
        required: true
      WHATSAPP_VERIFY_TOKEN:
        description: 'WhatsApp webhook verify token'
        required: true
      GHCR_PULL_TOKEN:
        description: 'GitHub PAT with read:packages for pulling images from GHCR'
        required: true
      OCI_QUEUE_ID:
        description: 'OCI Queue OCID'
        required: true
      OCI_DLQ_ID:
        description: 'OCI Dead Letter Queue OCID'
        required: true
      OCI_TENANCY_ID:
        description: 'OCI Tenancy OCID'
        required: true
      OCI_USER_ID:
        description: 'OCI User OCID'
        required: true
      OCI_FINGERPRINT:
        description: 'OCI API key fingerprint'
        required: true
      OCI_PRIVATE_KEY_STRING:
        description: 'OCI private key PEM content'
        required: true

env:
  MICROSERVICE_NAME: whatsapp-gateway
  MANIFEST_PATH: Business_Bot/03-workloads/overlays/whatsapp-gateway
  IMAGE_NAME: businessbot-whatsapp-gateway
  CONTAINER_NAME: app
  KUBE_DEPLOYMENT: whatsapp-gateway-microservice-base
  PORT: '3000'

jobs:
  validate:
    name: Validate Manifests
    uses: gabrielwyp/K3S_Infra/.github/workflows/validate-manifests.yml@main
    with:
      manifest-path: Business_Bot

  pre-deploy-checks:
    name: Pre-deploy Checks
    runs-on: self-hosted
    needs: validate
    steps:
      - name: Checkout K3S_Infra
        uses: actions/checkout@v4
        with:
          repository: gabrielwyp/K3S_Infra

      - name: Setup kubeconfig
        env:
          KUBECONFIG_B64: ${{ secrets.KUBECONFIG_B64 }}
        run: |
          echo "$KUBECONFIG_B64" | base64 -d > /tmp/kubeconfig
          chmod 600 /tmp/kubeconfig
          export KUBECONFIG=/tmp/kubeconfig
          
          echo "Pre-deploy checks for WhatsApp Gateway..."
          
          kubectl get namespace ${{ inputs.kube-namespace }} || {
            echo "Namespace does not exist, will be created during deploy"
          }
          
          kubectl get deployment ${{ env.KUBE_DEPLOYMENT }} -n ${{ inputs.kube-namespace }} 2>/dev/null || {
            echo "No existing deployment found, fresh deploy"
          }

  deploy-core:
    name: Deploy Core
    runs-on: self-hosted
    needs: [validate, pre-deploy-checks]
    steps:
      - name: Checkout K3S_Infra
        uses: actions/checkout@v4
        with:
          repository: gabrielwyp/K3S_Infra

      - name: Prepare WhatsApp secrets JSON
        id: secrets-json
        run: |
          echo "Preparing WhatsApp secrets JSON..."

          WA_TOKEN="${{ secrets.WHATSAPP_ACCESS_TOKEN }}"
          WA_API_URL="${{ secrets.WHATSAPP_API_URL }}"
          WA_PHONE_ID="${{ secrets.WHATSAPP_PHONE_NUMBER_ID }}"
          WA_WEBHOOK_SECRET="${{ secrets.WHATSAPP_WEBHOOK_SECRET }}"
          WA_VERIFY_TOKEN="${{ secrets.WHATSAPP_VERIFY_TOKEN }}"
          OCI_QUEUE_ID="${{ secrets.OCI_QUEUE_ID }}"
          OCI_DLQ_ID="${{ secrets.OCI_DLQ_ID }}"
          OCI_TENANCY_ID="${{ secrets.OCI_TENANCY_ID }}"
          OCI_USER_ID="${{ secrets.OCI_USER_ID }}"
          OCI_FINGERPRINT="${{ secrets.OCI_FINGERPRINT }}"
          OCI_PRIVATE_KEY_STRING="${{ secrets.OCI_PRIVATE_KEY_STRING }}"

          if [ -z "$WA_TOKEN" ] || [ -z "$WA_API_URL" ] || [ -z "$WA_PHONE_ID" ] || [ -z "$WA_WEBHOOK_SECRET" ] || [ -z "$WA_VERIFY_TOKEN" ]; then
            echo "::error::Missing required WhatsApp secrets."
            exit 1
          fi

          if [ -z "$OCI_QUEUE_ID" ] || [ -z "$OCI_DLQ_ID" ] || [ -z "$OCI_TENANCY_ID" ] || [ -z "$OCI_USER_ID" ] || [ -z "$OCI_FINGERPRINT" ] || [ -z "$OCI_PRIVATE_KEY_STRING" ]; then
            echo "::error::Missing required OCI secrets."
            exit 1
          fi
          
          SECRETS_JSON=$(jq -cn \
            --arg wa_token "$WA_TOKEN" \
            --arg wa_api_url "$WA_API_URL" \
            --arg wa_phone_id "$WA_PHONE_ID" \
            --arg wa_webhook_secret "$WA_WEBHOOK_SECRET" \
            --arg wa_verify_token "$WA_VERIFY_TOKEN" \
            --arg oci_queue_id "$OCI_QUEUE_ID" \
            --arg oci_dlq_id "$OCI_DLQ_ID" \
            --arg oci_tenancy_id "$OCI_TENANCY_ID" \
            --arg oci_user_id "$OCI_USER_ID" \
            --arg oci_fingerprint "$OCI_FINGERPRINT" \
            --arg oci_private_key "$OCI_PRIVATE_KEY_STRING" \
            '{
              WHATSAPP_ACCESS_TOKEN: $wa_token,
              WHATSAPP_API_URL: $wa_api_url,
              WHATSAPP_PHONE_NUMBER_ID: $wa_phone_id,
              WHATSAPP_WEBHOOK_SECRET: $wa_webhook_secret,
              WHATSAPP_VERIFY_TOKEN: $wa_verify_token,
              OCI_QUEUE_ID: $oci_queue_id,
              OCI_DLQ_ID: $oci_dlq_id,
              OCI_TENANCY_ID: $oci_tenancy_id,
              OCI_USER_ID: $oci_user_id,
              OCI_FINGERPRINT: $oci_fingerprint,
              OCI_PRIVATE_KEY_STRING: $oci_private_key
            }')
          
          {
            echo "json<<SECRETS_EOF"
            echo "$SECRETS_JSON"
            echo "SECRETS_EOF"
          } >> "$GITHUB_OUTPUT"
          echo "Secrets JSON prepared (values hidden for security)"

      - name: Deploy to K3S
        uses: ./.github/actions/bb-deploy-core/
        with:
          microservice-name: ${{ env.MICROSERVICE_NAME }}
          image-tag: ${{ inputs.image-tag }}
          kube-namespace: ${{ inputs.kube-namespace }}
          manifest-path: ${{ env.MANIFEST_PATH }}
          image-name: ${{ env.IMAGE_NAME }}
          container-name: ${{ env.CONTAINER_NAME }}
          kube-deployment: ${{ env.KUBE_DEPLOYMENT }}
          port: ${{ env.PORT }}
        env:
          KUBECONFIG_B64: ${{ secrets.KUBECONFIG_B64 }}
          GHCR_PULL_TOKEN: ${{ secrets.GHCR_PULL_TOKEN }}
          MICROSERVICE_SECRETS_JSON: ${{ steps.secrets-json.outputs.json }}

  post-deploy-verification:
    name: Post-deploy Verification
    runs-on: self-hosted
    needs: deploy-core
    steps:
      - name: Checkout K3S_Infra
        uses: actions/checkout@v4
        with:
          repository: gabrielwyp/K3S_Infra

      - name: Setup kubeconfig
        env:
          KUBECONFIG_B64: ${{ secrets.KUBECONFIG_B64 }}
        run: |
          echo "$KUBECONFIG_B64" | base64 -d > /tmp/kubeconfig
          chmod 600 /tmp/kubeconfig
          export KUBECONFIG=/tmp/kubeconfig

      - name: Verify IngressRoute
        env:
          KUBECONFIG: /tmp/kubeconfig
        run: |
          echo "Verifying WhatsApp webhook IngressRoute..."
          
          INGRESS=$(kubectl get ingressroute -n ${{ inputs.kube-namespace }} | grep ${{ env.MICROSERVICE_NAME }} || true)
          if [ -n "$INGRESS" ]; then
            echo "IngressRoute found:"
            echo "$INGRESS"
          else
            echo "Warning: IngressRoute not found, webhook may not be accessible"
          fi

      - name: Test webhook endpoint (optional)
        env:
          KUBECONFIG: /tmp/kubeconfig
        run: |
          echo "Note: Webhook endpoint testing requires external access"
          echo "Verify manually that webhook is accessible at your configured URL"
          
          kubectl get svc -n ${{ inputs.kube-namespace }} | grep ${{ env.MICROSERVICE_NAME }}

  notify-success:
    name: Notify Success
    runs-on: self-hosted
    needs: post-deploy-verification
    if: success()
    steps:
      - name: Deployment summary
        run: |
          echo ""
          echo "=========================================="
          echo "  WhatsApp Gateway Deployment Complete"
          echo "=========================================="
          echo "  Microservice: ${{ env.MICROSERVICE_NAME }}"
          echo "  Image Tag: ${{ inputs.image-tag }}"
          echo "  Namespace: ${{ inputs.kube-namespace }}"
          echo "  Port: ${{ env.PORT }}"
          echo ""
          echo "  Next Steps:"
          echo "    1. Verify webhook URL is accessible"
          echo "    2. Test message receiving/sending"
          echo "    3. Check logs: kubectl logs -n ${{ inputs.kube-namespace }} -l app=${{ env.KUBE_DEPLOYMENT }}"
          echo "=========================================="
