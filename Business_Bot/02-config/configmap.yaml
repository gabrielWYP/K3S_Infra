---
apiVersion: v1
kind: ConfigMap
metadata:
  name: business-bot-config
  namespace: businessbot
  labels:
    app: business-bot
    component: config
data:
  # Project Configuration
  APP_NAME: "Business Bot"
  PROJECT_NAME: "business-bot"
  ENVIRONMENT: "production"
  LOG_LEVEL: "INFO"
  APP_MODE: "PRODUCTION"

  # Infrastructure Configuration
  REPOSITORY: "ghcr.io"
  NAMESPACE: "businessbot"

  # Service Discovery - Internal URLs
  # Each service reads only the URLs it needs from here.
  WHATSAPP_GATEWAY_URL: "http://whatsapp-gateway-microservice-base-service:80"
  AUDIO_PROCESSOR_URL: "http://audio-processor-microservice-base-service:80"
  ROUTER_SERVICE_URL: "http://router-microservice-base-service:80"
  TOOL_EXECUTOR_URL: "http://tool-executor-microservice-base-service:80"
  RESPONSE_GENERATOR_URL: "http://response-generator-microservice-base-service:80"
  IMAGE_PROCESSOR_URL: "http://image-processor-microservice-base-service:80"

  # Default Service Configuration
  DEFAULT_TIMEOUT: "30"
  MAX_RETRIES: "3"
  RATE_LIMIT_REQUESTS: "100"
  RATE_LIMIT_WINDOW: "60"
