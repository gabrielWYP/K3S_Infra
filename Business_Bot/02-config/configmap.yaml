---
apiVersion: v1
kind: ConfigMap
metadata:
  name: business-bot-config
  namespace: businessbot
  labels:
    app: business-bot
    component: config
data:
  # Project Configuration
  APP_NAME: "Business Bot"
  PROJECT_NAME: "business-bot"
  ENVIRONMENT: "production"
  LOG_LEVEL: "INFO"
  APP_MODE: "PRODUCTION"
  
  # Infrastructure Configuration
  REPOSITORY: "ghcr.io"
  NAMESPACE: "businessbot"
  
  # Service Discovery - Internal URLs
  WHATSAPP_GATEWAY_URL: "http://whatsapp-gateway-service:3000"
  # Default Service Configuration
  DEFAULT_TIMEOUT: "30"
  MAX_RETRIES: "3"
  RATE_LIMIT_REQUESTS: "100"
  RATE_LIMIT_WINDOW: "60"
---