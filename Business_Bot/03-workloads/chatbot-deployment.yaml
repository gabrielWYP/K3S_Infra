apiVersion: apps/v1
kind: Deployment
metadata:
  name: business-bot-chatbot
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: business-bot-chatbot
  template:
    metadata:
      labels:
        app: business-bot-chatbot
    spec:
      serviceAccountName: business-bot-sa
      containers:
      - name: chatbot
        image: ghcr.io/your-org/business-bot-chatbot:latest
        ports:
        - containerPort: 8001
        envFrom:
        - configMapRef:
            name: business-bot-config