---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: business-bot

resources:
  - ../../base

namePrefix: chatbot-

commonLabels:
  app: chatbot
  component: ai
  version: v1

patchesStrategicMerge:
  - deployment-patch.yaml

images:
  - name: ghcr.io/gabrielwyp/business-bot-microservice
    newName: ghcr.io/gabrielwyp/businessbot--chatbot
    newTag: latest
