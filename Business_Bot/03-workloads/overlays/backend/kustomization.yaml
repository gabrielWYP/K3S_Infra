---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: business-bot

resources:
  - ../../base

namePrefix: backend-

commonLabels:
  app: backend
  component: api
  version: v1

patchesStrategicMerge:
  - deployment-patch.yaml

images:
  - name: ghcr.io/gabrielwyp/business-bot-microservice
    newName: ghcr.io/gabrielwyp/businessbot--backend
    newTag: latest
