---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: microservice-base
spec:
  template:
    spec:
      containers:
      - name: app
        ports:
        - name: http
          containerPort: 8000
        env:
        - name: SERVICE_NAME
          value: "backend"
        - name: PORT
          value: "8000"
        startupProbe:
          httpGet:
            path: /health
            port: 8000
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
        envFrom:
        - configMapRef:
            name: business-bot-config
        - secretRef:
            name: business-bot-global-secrets
        - secretRef:
            name: backend-secrets
