---
- op: replace
  path: /spec/template/spec/containers/0/ports
  value:
    - name: http
      containerPort: 3003
- op: replace
  path: /spec/template/spec/containers/0/env
  value:
    - name: SERVICE_NAME
      value: "tool-executor"
    - name: PORT
      value: "3003"
- op: replace
  path: /spec/template/spec/containers/0/startupProbe
  value:
    httpGet:
      path: /health
      port: 3003
    failureThreshold: 30
    periodSeconds: 5
- op: replace
  path: /spec/template/spec/containers/0/readinessProbe
  value:
    httpGet:
      path: /health
      port: 3003
    initialDelaySeconds: 15
    periodSeconds: 10
- op: replace
  path: /spec/template/spec/containers/0/livenessProbe
  value:
    httpGet:
      path: /health
      port: 3003
    initialDelaySeconds: 30
    periodSeconds: 30
- op: replace
  path: /spec/template/spec/containers/0/envFrom
  value:
    - configMapRef:
        name: business-bot-config
    - secretRef:
        name: tool-executor-secrets
- op: replace
  path: /spec/template/spec/containers/0/resources
  value:
    requests:
      memory: "128Mi"
      cpu: "100m"
    limits:
      memory: "384Mi"
      cpu: "500m"
