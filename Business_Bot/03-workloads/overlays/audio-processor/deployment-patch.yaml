---
- op: replace
  path: /spec/template/spec/containers/0/ports
  value:
    - name: http
      containerPort: 3001
- op: replace
  path: /spec/template/spec/containers/0/env
  value:
    - name: SERVICE_NAME
      value: "audio-processor"
    - name: PORT
      value: "3001"
- op: replace
  path: /spec/template/spec/containers/0/startupProbe
  value:
    httpGet:
      path: /health
      port: 3001
    failureThreshold: 30
    periodSeconds: 5
- op: replace
  path: /spec/template/spec/containers/0/readinessProbe
  value:
    httpGet:
      path: /health
      port: 3001
    initialDelaySeconds: 15
    periodSeconds: 10
- op: replace
  path: /spec/template/spec/containers/0/livenessProbe
  value:
    httpGet:
      path: /health
      port: 3001
    initialDelaySeconds: 30
    periodSeconds: 30
- op: replace
  path: /spec/template/spec/containers/0/envFrom
  value:
    - configMapRef:
        name: business-bot-config
    - secretRef:
        name: audio-processor-secrets
- op: replace
  path: /spec/template/spec/containers/0/resources
  value:
    requests:
      memory: "256Mi"
      cpu: "200m"
    limits:
      memory: "768Mi"
      cpu: "750m"
