---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: businessbot

resources:
  - ../../base

namePrefix: whatsapp-gateway-

commonLabels:
  app: whatsapp-gateway
  component: gateway
  version: v1

patchesStrategicMerge:
  - deployment-patch.yaml
  - service-patch.yaml

images:
  - name: ghcr.io/gabrielwyp/business-bot-microservice
    newName: ghcr.io/gabrielwyp/businessbot-whatsapp-gateway
    newTag: latest
