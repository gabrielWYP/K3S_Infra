---
- op: replace
  path: /spec/template/spec/containers/0/ports
  value:
    - name: http
      containerPort: 3000
- op: replace
  path: /spec/template/spec/containers/0/env
  value:
    - name: SERVICE_NAME
      value: "whatsapp-gateway"
    - name: PORT
      value: "3000"
    - name: OCI_PRIVATE_KEY_PATH
      value: "/app/auth/OCI_PRIVATE_KEY_STRING"
- op: replace
  path: /spec/template/spec/containers/0/startupProbe
  value:
    httpGet:
      path: /health
      port: 3000
    failureThreshold: 30
    periodSeconds: 5
- op: replace
  path: /spec/template/spec/containers/0/readinessProbe
  value:
    httpGet:
      path: /health
      port: 3000
    initialDelaySeconds: 15
    periodSeconds: 10
- op: replace
  path: /spec/template/spec/containers/0/livenessProbe
  value:
    httpGet:
      path: /health
      port: 3000
    initialDelaySeconds: 30
    periodSeconds: 30
- op: replace
  path: /spec/template/spec/containers/0/envFrom
  value:
    - configMapRef:
        name: business-bot-config
    - secretRef:
        name: whatsapp-gateway-secrets
- op: add
  path: /spec/template/spec/containers/0/volumeMounts
  value:
    - name: oci-key
      mountPath: "/app/auth"
      readOnly: true
- op: add
  path: /spec/template/spec/volumes
  value:
    - name: oci-key
      secret:
        secretName: whatsapp-gateway-secrets
        items:
          - key: OCI_PRIVATE_KEY_STRING
            path: OCI_PRIVATE_KEY_STRING
