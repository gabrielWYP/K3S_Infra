apiVersion: apps/v1
kind: Deployment
metadata:
  name: business-bot-backend
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: business-bot-backend
  template:
    metadata:
      labels:
        app: business-bot-backend
    spec:
      serviceAccountName: business-bot-sa
      containers:
      - name: backend
        image: ghcr.io/your-org/business-bot-backend:latest
        ports:
        - containerPort: 8000
        envFrom:
        - configMapRef:
            name: business-bot-config