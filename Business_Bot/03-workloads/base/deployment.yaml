---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: microservice-base
  labels:
    app: microservice-base
spec:
  replicas: 1
  selector:
    matchLabels:
      app: microservice-base
  template:
    metadata:
      labels:
        app: microservice-base
    spec:
      serviceAccountName: business-bot-sa
      containers:
      - name: app
        image: ghcr.io/gabrielwyp/business-bot-microservice:latest
        imagePullPolicy: IfNotPresent
        ports:
        - name: http
          containerPort: 8080
        envFrom:
        - configMapRef:
            name: business-bot-config
        env:
        - name: SERVICE_NAME
          value: "microservice-base"
        startupProbe:
          httpGet:
            path: /health
            port: 8080
          failureThreshold: 30
          periodSeconds: 5
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 15
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 30
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
